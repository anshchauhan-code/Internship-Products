<!DOCTYPE html>
<html>
<head>
    <title>Portfolio Module</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="mainBox">
        <h1>My Portfolio</h1>
        <div class="profile">
            <h2>Profile Section</h2>
            <img src="me.png" alt="Profile Image">
            <p><b>Name:</b> Ansh Chauhan</p>
            <p><b>Institution: </b>Amrita Vishwa Vidyapeetham, Haridwar</p>
        </div>

        <div class="contact">
            <h2>Contact Form</h2>
            <form>
                <input type="text" placeholder="Enter Name" id="name"><br>
                <input type="email" placeholder="Enter Email" id="email"><br>
                <textarea placeholder="Enter Message" id="message"></textarea><br>
                <button type="submit" onclick="Submit()">Send</button>
            </form>
        </div>

        <div class="links">
            <h2>Social Links</h2>
            <a href="https://www.github.in">GitHub</a><br>
            <a href="https://www.linkedin.com">LinkedIn</a><br>
            <a href="#">Portfolio Website</a>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
